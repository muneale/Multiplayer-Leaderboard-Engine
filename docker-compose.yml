x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    logging: *default-logging
    image: postgres:16.11-alpine
    environment:
      POSTGRES_DB: leaderboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leaderboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    logging: *default-logging
    image: redis:7.4.7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./infra/redis/redis.conf:/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    logging: *default-logging
    image: otel/opentelemetry-collector-contrib:0.154.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

  kafka:
    logging: *default-logging
    image: apache/kafka:4.3.1
    ports:
      - "9094:9094"
    environment:
      # KRaft mode — no Zookeeper
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-setup:
    logging: *default-logging
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create-topics.sh:/create-topics.sh
    entrypoint: ["/bin/sh", "/create-topics.sh"]
    environment:
      KAFKA_ADDR: "kafka:9092"

  kafka-ui:
    logging: *default-logging
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy

  schema-registry:
    logging: *default-logging
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 5s
      timeout: 5s
      retries: 10

  player-service:
    logging: *default-logging
    build:
      context: ./services/player-service
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/leaderboard?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "player-events"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  score-service:
    logging: *default-logging
    build:
      context: ./services/score-service
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "score-events"
      REDIS_ADDR: "redis:6379"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      redis:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ranking-service:
    logging: *default-logging
    build:
      context: ./services/ranking-service
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "score-events"
      KAFKA_GROUP_ID: "ranking-service"
      REDIS_ADDR: "redis:6379"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      redis:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  query-service:
    logging: *default-logging
    build:
      context: ./services/query-service
    ports:
      - "3004:3004"
    environment:
      PORT: "3004"
      REDIS_ADDR: "redis:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  snapshot-service:
    logging: *default-logging
    build:
      context: ./services/snapshot-service
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/leaderboard?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      SNAPSHOT_INTERVAL_SECONDS: "300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    logging: *default-logging
    image: jaegertracing/all-in-one:2.19.0
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    logging: *default-logging
    image: prom/prometheus:v3.12.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    logging: *default-logging
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  apisix:
    logging: *default-logging
    image: apache/apisix:3.17.0-debian
    ports:
      - "8080:9080"
    volumes:
      - ./gateway/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./gateway/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      player-service:
        condition: service_healthy
      score-service:
        condition: service_healthy
      query-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  grafana_data:
