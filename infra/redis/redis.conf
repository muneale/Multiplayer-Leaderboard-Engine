# AOF persistence — leaderboard data survives container restarts.
appendonly yes
appendfsync everysec

# Disable RDB snapshots; AOF is sufficient for this workload.
save ""

# No memory limit in dev — prevents silent eviction of leaderboard sorted sets.
# Production: set maxmemory + volatile-lru so only TTL-bearing keys
# (player:exists:*, dedup:score-events:*) are candidates for eviction,
# keeping the leaderboard sorted sets intact.
maxmemory 0

loglevel notice
